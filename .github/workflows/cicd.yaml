name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  # Based on your file, your username is madushanka-devops
  IMAGE_OWNER: madushanka-devops 

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      new_version: ${{ steps.versioning.outputs.version }}

    steps:
      - name: Checkout App Repo
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      # 1. GENERATE SEMANTIC VERSION
      - name: Calculate Semantic Version
        id: versioning
        uses: paulhatch/semantic-version@v5.4.0
        with:
          tag_prefix: "v"
          major_pattern: "(MAJOR)"
          minor_pattern: "(MINOR)"
          version_format: "${major}.${minor}.${patch}"
          user_format_type: "csv"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 2. BUILD AND PUSH (Matrix Strategy)
      # This maps your folder names to the image names found in your deploy-all.yaml
      - name: Build and Push Docker Images
        uses: docker/build-push-action@v4
        with:
          context: ./${{ matrix.folder }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ matrix.image_name }}:${{ steps.versioning.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ matrix.image_name }}:latest
        strategy:
          matrix:
            include:
              - folder: product-service
                image_name: microservices-product
              - folder: cart-service
                image_name: microservices-cart
              - folder: frontend
                image_name: microservices-frontend

  update-manifests:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Infra Repo
        uses: actions/checkout@v3
        with:
          # REPLACE with your actual GitHub username for the infra repo
          repository: madushanka-devops/microservices-infra
          token: ${{ secrets.INFRA_REPO_PAT }}
          path: infra-repo

      - name: Install yq
        run: sudo snap install yq

      # 3. UPDATE KUBERNETES MANIFESTS
      - name: Update deploy-all.yaml
        run: |
          NEW_TAG=${{ needs.build-and-push.outputs.new_version }}
          REGISTRY_ROOT=${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}
          
          echo "Updating manifests to version $NEW_TAG"

          # Loop through environments
          for env in dev staging production; do
             FILE="infra-repo/$env/deploy-all.yaml"
             
             if [ -f "$FILE" ]; then
                echo "Updating $FILE..."
                
                # Update Product Service
                # We use select() to find the specific Deployment by name
                yq -i "select(.kind == \"Deployment\" and .metadata.name == \"product-service\").spec.template.spec.containers[0].image = \"$REGISTRY_ROOT/microservices-product:$NEW_TAG\"" $FILE
                
                # Update Cart Service
                yq -i "select(.kind == \"Deployment\" and .metadata.name == \"cart-service\").spec.template.spec.containers[0].image = \"$REGISTRY_ROOT/microservices-cart:$NEW_TAG\"" $FILE
                
                # Update Frontend
                yq -i "select(.kind == \"Deployment\" and .metadata.name == \"frontend\").spec.template.spec.containers[0].image = \"$REGISTRY_ROOT/microservices-frontend:$NEW_TAG\"" $FILE
                
             else
                echo "Warning: $FILE not found, skipping."
             fi
          done

      - name: Commit and Push Changes
        working-directory: infra-repo
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Update image versions to $NEW_TAG"
          git push
